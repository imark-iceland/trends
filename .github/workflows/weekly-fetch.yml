name: IMARK Intelligence Weekly Watch

on:
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  intelligence:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Fetch intelligence items
        run: node src/fetch.js

      - name: Generate dashboard
        run: node src/generate.js

      - name: Commit and push
        run: |
          git config user.name "IMARK Intelligence Bot"
          git config user.email "intelligence-bot@imark.is"
          git add data/ docs/
          git diff --staged --quiet || git commit -m "chore: weekly intelligence update $(date +'%Y-W%V')"
          git push
