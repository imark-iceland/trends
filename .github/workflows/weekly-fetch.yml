name: ÍMARK Weekly Trends Fetch

on:
  # Run every Monday at 07:00 UTC (matches Iceland timezone, no DST)
  schedule:
    - cron: "0 7 * * 1"

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch full history so we can commit back
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Fetch weekly trends
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run fetch

      - name: Generate dashboard HTML
        run: npm run generate

      - name: Commit updated data and dashboard
        run: |
          git config user.name "ÍMARK Trends Bot"
          git config user.email "trends-bot@imark.is"
          git add data/ docs/
          git diff --staged --quiet || git commit -m "chore: weekly trends update $(date +'%Y-W%V')"
          git push

      - name: Upload dashboard artifact
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-${{ github.run_id }}
          path: public/
          retention-days: 90
